<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .wall   { fill: none; stroke: #334155; stroke-width: 4; }
      .inner-wall { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 4 2; }
      .desk   { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .room   { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .common { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .label  { font-size: 11px; fill: #1e293b; text-anchor: middle; font-weight: 500; }
      .title  { font-size: 24px; fill: #0f172a; font-weight: 800; }
      .roomlabel { font-size: 12px; fill: #0f172a; text-anchor: middle; font-weight: bold; }
    </style>
  </defs>
  <rect width="1000" height="600" fill="#f8fafc" />
  <rect class="wall" x="20" y="20" width="960" height="560" rx="12" />
  <text class="title" x="40" y="60">Modern Hybrid Office Layout</text>
  <line class="inner-wall" x1="500" y1="20" x2="500" y2="580" />
  <g id="brainstorm-zone">
    <rect class="room" id="brainstorm_zone" x="40" y="100" width="420" height="200" rx="8" />
    <text class="roomlabel" x="250" y="195">Creative Brainstorming Zone</text>
    <text class="label" x="250" y="215">(Interactive Screen, Soft Seating)</text>
  </g>
  <g id="phone-booth-1">
    <rect class="room" id="phone_booth_1" x="40" y="330" width="120" height="100" rx="8" />
    <text class="roomlabel" x="100" y="385">Phone Booth 1</text>
  </g>
  <g id="phone-booth-2">
    <rect class="room" id="phone_booth_2" x="180" y="330" width="120" height="100" rx="8" />
    <text class="roomlabel" x="240" y="385">Phone Booth 2</text>
  </g>
  <g>
    <rect class="common" x="320" y="330" width="140" height="100" rx="8" />
    <text class="roomlabel" x="390" y="385">Coffee Bar</text>
  </g>
  <g id="g-desk_hot_1">
    <rect class="desk" id="desk_hot_1" x="540" y="110" width="90" height="50" rx="4" />
    <text class="label" x="585" y="140">Hot Desk 1</text>
  </g>
  <g id="g-desk_hot_2">
    <rect class="desk" id="desk_hot_2" x="540" y="210" width="90" height="50" rx="4" />
    <text class="label" x="585" y="240">Hot Desk 2</text>
  </g>
  <g id="g-desk_hot_3">
    <rect class="desk" id="desk_hot_3" x="650" y="110" width="90" height="50" rx="4" />
    <text class="label" x="695" y="140">Hot Desk 3</text>
  </g>
  <g id="g-desk_hot_4">
    <rect class="desk" id="desk_hot_4" x="650" y="210" width="90" height="50" rx="4" />
    <text class="label" x="695" y="240">Hot Desk 4</text>
  </g>
  <g id="g-desk_hot_5">
    <rect class="desk" id="desk_hot_5" x="760" y="110" width="90" height="50" rx="4" />
    <text class="label" x="805" y="140">Hot Desk 5</text>
  </g>
  <g id="g-desk_hot_6">
    <rect class="desk" id="desk_hot_6" x="760" y="210" width="90" height="50" rx="4" />
    <text class="label" x="805" y="240">Hot Desk 6</text>
  </g>
  <g id="g-desk_stand_1">
    <rect class="desk" id="desk_stand_1" x="540" y="380" width="90" height="45" rx="4" />
    <text class="label" x="585" y="405">Stand Desk 1</text>
  </g>
  <g id="g-desk_stand_2">
    <rect class="desk" id="desk_stand_2" x="650" y="380" width="90" height="45" rx="4" />
    <text class="label" x="695" y="405">Stand Desk 2</text>
  </g>
  <g id="g-desk_stand_3">
    <rect class="desk" id="desk_stand_3" x="760" y="380" width="90" height="45" rx="4" />
    <text class="label" x="805" y="405">Stand Desk 3</text>
  </g>

</svg>