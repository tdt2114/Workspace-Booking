<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .wall   { fill: none; stroke: #334155; stroke-width: 4; }
      .inner-wall { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 4 2; }
      .desk   { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .room   { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .common { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .label  { font-size: 11px; fill: #1e293b; text-anchor: middle; font-weight: 500; }
      .title  { font-size: 24px; fill: #0f172a; font-weight: 800; }
      .roomlabel { font-size: 12px; fill: #0f172a; text-anchor: middle; font-weight: bold; }
    </style>
  </defs>
  <rect width="1000" height="600" fill="#f8fafc" />
  <rect class="wall" x="20" y="20" width="960" height="560" rx="12" />
  <text class="title" x="40" y="60">AI Dev &amp; R&amp;D Lab</text>
  <line class="inner-wall" x1="450" y1="20" x2="450" y2="580" />
  <g id="lab-ai">
    <rect class="room" id="lab_ai" x="50" y="100" width="350" height="200" rx="8" />
    <text class="roomlabel" x="225" y="195">Core AI Lab</text>
    <text class="label" x="225" y="215">(12 Stations)</text>
  </g>
  <g id="server-room">
    <rect class="common" x="50" y="340" width="160" height="210" rx="8" />
    <text class="roomlabel" x="130" y="440">Server Rack Room</text>
    <text class="label" x="130" y="460">[Staff Only]</text>
  </g>
  <g id="focus-booth-1">
    <rect class="room" id="focus_booth_1" x="240" y="340" width="160" height="95" rx="8" />
    <text class="roomlabel" x="320" y="390">Focus Booth 1</text>
  </g>
  <g id="focus-booth-2">
    <rect class="room" id="focus_booth_2" x="240" y="455" width="160" height="95" rx="8" />
    <text class="roomlabel" x="320" y="505">Focus Booth 2</text>
  </g>
  <g id="g-desk_dev_1">
    <rect class="desk" id="desk_dev_1" x="500" y="140" width="90" height="45" rx="4" />
    <text class="label" x="545" y="165">Dev 1</text>
  </g>
  <g id="g-desk_dev_2">
    <rect class="desk" id="desk_dev_2" x="610" y="140" width="90" height="45" rx="4" />
    <text class="label" x="655" y="165">Dev 2</text>
  </g>
  <g id="g-desk_dev_3">
    <rect class="desk" id="desk_dev_3" x="720" y="140" width="90" height="45" rx="4" />
    <text class="label" x="765" y="165">Dev 3</text>
  </g>
  <g id="g-desk_dev_4">
    <rect class="desk" id="desk_dev_4" x="500" y="280" width="90" height="45" rx="4" />
    <text class="label" x="545" y="305">Dev 4</text>
  </g>
  <g id="g-desk_dev_5">
    <rect class="desk" id="desk_dev_5" x="610" y="280" width="90" height="45" rx="4" />
    <text class="label" x="655" y="305">Dev 5</text>
  </g>
  <g id="g-desk_dev_6">
    <rect class="desk" id="desk_dev_6" x="720" y="280" width="90" height="45" rx="4" />
    <text class="label" x="765" y="305">Dev 6</text>
  </g>
  <g id="g-desk_dev_7">
    <rect class="desk" id="desk_dev_7" x="500" y="420" width="90" height="45" rx="4" />
    <text class="label" x="545" y="445">Dev 7</text>
  </g>
  <g id="g-desk_dev_8">
    <rect class="desk" id="desk_dev_8" x="610" y="420" width="90" height="45" rx="4" />
    <text class="label" x="655" y="445">Dev 8</text>
  </g>
  <g id="g-desk_dev_9">
    <rect class="desk" id="desk_dev_9" x="720" y="420" width="90" height="45" rx="4" />
    <text class="label" x="765" y="445">Dev 9</text>
  </g>

</svg>