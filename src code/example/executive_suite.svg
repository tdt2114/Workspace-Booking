<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .wall   { fill: none; stroke: #334155; stroke-width: 4; }
      .inner-wall { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 4 2; }
      .desk   { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .room   { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .common { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .label  { font-size: 11px; fill: #1e293b; text-anchor: middle; font-weight: 500; }
      .title  { font-size: 24px; fill: #0f172a; font-weight: 800; }
      .roomlabel { font-size: 12px; fill: #0f172a; text-anchor: middle; font-weight: bold; }
    </style>
  </defs>
  <rect width="1000" height="600" fill="#f8fafc" />
  <rect class="wall" x="20" y="20" width="960" height="560" rx="12" />
  <text class="title" x="40" y="60">Executive &amp; Boardroom Suite</text>
  <line class="inner-wall" x1="480" y1="20" x2="480" y2="580" />
  <g id="boardroom-main">
    <rect class="room" id="boardroom_main" x="40" y="100" width="400" height="300" rx="8" />
    <rect x="120" y="180" width="240" height="60" rx="30" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
    <text class="roomlabel" x="240" y="215">Main Conference Boardroom</text>
    <text class="label" x="240" y="235">(Capacity: 16)</text>
  </g>
  <g id="room-ceo">
    <rect class="room" id="room_ceo" x="520" y="100" width="200" height="210" rx="8" />
    <text class="roomlabel" x="620" y="200">CEO Suite</text>
  </g>
  <g id="room-cfo">
    <rect class="room" id="room_cfo" x="740" y="100" width="200" height="210" rx="8" />
    <text class="roomlabel" x="840" y="200">CFO Suite</text>
  </g>
  <g id="desk-sec-1">
    <rect class="desk" id="desk_sec_1" x="520" y="350" width="180" height="60" rx="4" />
    <text class="roomlabel" x="610" y="380">Secretary Desk 1</text>
  </g>
  <g id="desk-sec-2">
    <rect class="desk" id="desk_sec_2" x="740" y="350" width="180" height="60" rx="4" />
    <text class="roomlabel" x="830" y="380">Secretary Desk 2</text>
  </g>
  <g>
    <rect class="common" x="40" y="430" width="400" height="130" rx="8" />
    <text class="roomlabel" x="240" y="500">Reception Lobby &amp; Waiting Lounge</text>
  </g>

</svg>