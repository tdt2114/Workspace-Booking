<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .wall   { fill: none; stroke: #334155; stroke-width: 4; }
      .inner-wall { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 4 2; }
      .desk   { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .room   { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .common { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .label  { font-size: 11px; fill: #1e293b; text-anchor: middle; font-weight: 500; }
      .title  { font-size: 24px; fill: #0f172a; font-weight: 800; }
      .roomlabel { font-size: 12px; fill: #0f172a; text-anchor: middle; font-weight: bold; }
    </style>
  </defs>
  <rect width="1000" height="600" fill="#f8fafc" />
  <rect class="wall" x="20" y="20" width="960" height="560" rx="12" />
  <text class="title" x="40" y="60">Design &amp; Media Creative Studio</text>
  <line class="inner-wall" x1="450" y1="20" x2="450" y2="580" />
  <g id="studio-green">
    <rect class="room" id="studio_green" x="40" y="100" width="370" height="230" rx="8" />
    <text class="roomlabel" x="225" y="210">Green Screen &amp; Video Production</text>
    <text class="label" x="225" y="230">(Equipped with Profoto Lighting)</text>
  </g>
  <g id="booth-edit-1">
    <rect class="room" id="booth_edit_1" x="40" y="360" width="170" height="90" rx="8" />
    <text class="roomlabel" x="125" y="410">Audio Recording 1</text>
  </g>
  <g id="booth-edit-2">
    <rect class="room" id="booth_edit_2" x="240" y="360" width="170" height="90" rx="8" />
    <text class="roomlabel" x="325" y="410">Video Editing 2</text>
  </g>
  <g>
    <rect class="common" x="40" y="470" width="370" height="90" rx="8" />
    <text class="roomlabel" x="225" y="520">Equipment Locker &amp; Charging Hub</text>
  </g>
  <g id="g-desk_design_1">
    <rect class="desk" id="desk_design_1" x="500" y="140" width="100" height="60" rx="4" />
    <text class="label" x="550" y="175">Design Desk 1</text>
  </g>
  <g id="g-desk_design_2">
    <rect class="desk" id="desk_design_2" x="640" y="140" width="100" height="60" rx="4" />
    <text class="label" x="690" y="175">Design Desk 2</text>
  </g>
  <g id="g-desk_design_3">
    <rect class="desk" id="desk_design_3" x="780" y="140" width="100" height="60" rx="4" />
    <text class="label" x="830" y="175">Design Desk 3</text>
  </g>
  <g id="g-desk_design_4">
    <rect class="desk" id="desk_design_4" x="500" y="340" width="100" height="60" rx="4" />
    <text class="label" x="550" y="375">Design Desk 4</text>
  </g>
  <g id="g-desk_design_5">
    <rect class="desk" id="desk_design_5" x="640" y="340" width="100" height="60" rx="4" />
    <text class="label" x="690" y="375">Design Desk 5</text>
  </g>
  <g id="g-desk_design_6">
    <rect class="desk" id="desk_design_6" x="780" y="340" width="100" height="60" rx="4" />
    <text class="label" x="830" y="375">Design Desk 6</text>
  </g>

</svg>