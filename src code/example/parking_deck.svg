<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .wall   { fill: none; stroke: #334155; stroke-width: 4; }
      .inner-wall { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 4 2; }
      .desk   { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .room   { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; cursor: pointer; transition: all 0.2s; }
      .common { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .label  { font-size: 11px; fill: #1e293b; text-anchor: middle; font-weight: 500; }
      .title  { font-size: 24px; fill: #0f172a; font-weight: 800; }
      .roomlabel { font-size: 12px; fill: #0f172a; text-anchor: middle; font-weight: bold; }
    </style>
  </defs>
  <rect width="1000" height="600" fill="#f8fafc" />
  <rect class="wall" x="20" y="20" width="960" height="560" rx="12" />
  <text class="title" x="40" y="60">Smart Parking Deck Level 1</text>
  <g id="parking-ev-1">
    <rect class="room" id="parking_ev_1" x="50" y="120" width="180" height="80" rx="4" />
    <text class="roomlabel" x="140" y="165">[EV Charger] Lot 1</text>
  </g>
  <g id="parking-ev-2">
    <rect class="room" id="parking_ev_2" x="50" y="220" width="180" height="80" rx="4" />
    <text class="roomlabel" x="140" y="265">[EV Charger] Lot 2</text>
  </g>
  <g id="parking-disabled">
    <rect class="room" id="parking_disabled" x="50" y="320" width="180" height="80" rx="4" />
    <text class="roomlabel" x="140" y="365">[Accessible] Lot 3</text>
  </g>
  <g>
    <rect class="common" x="50" y="440" width="180" height="100" rx="8" />
    <text class="roomlabel" x="140" y="495">Bicycle Parking Racks</text>
  </g>
  <rect x="270" y="100" width="100" height="460" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" />
  <text class="roomlabel" x="320" y="330" transform="rotate(-90, 320, 330)" fill="#64748b">DRIVEWAY LANE</text>
  <g id="g-parking_01">
    <rect class="desk" id="parking_01" x="420" y="120" width="180" height="65" rx="4" />
    <text class="label" x="510" y="155">Parking Space Lot 1</text>
  </g>
  <g id="g-parking_02">
    <rect class="desk" id="parking_02" x="420" y="195" width="180" height="65" rx="4" />
    <text class="label" x="510" y="230">Parking Space Lot 2</text>
  </g>
  <g id="g-parking_03">
    <rect class="desk" id="parking_03" x="420" y="270" width="180" height="65" rx="4" />
    <text class="label" x="510" y="305">Parking Space Lot 3</text>
  </g>
  <g id="g-parking_04">
    <rect class="desk" id="parking_04" x="420" y="345" width="180" height="65" rx="4" />
    <text class="label" x="510" y="380">Parking Space Lot 4</text>
  </g>
  <g id="g-parking_05">
    <rect class="desk" id="parking_05" x="420" y="420" width="180" height="65" rx="4" />
    <text class="label" x="510" y="455">Parking Space Lot 5</text>
  </g>
  <g id="g-parking_06">
    <rect class="desk" id="parking_06" x="620" y="120" width="180" height="65" rx="4" />
    <text class="label" x="710" y="155">Parking Space Lot 6</text>
  </g>
  <g id="g-parking_07">
    <rect class="desk" id="parking_07" x="620" y="195" width="180" height="65" rx="4" />
    <text class="label" x="710" y="230">Parking Space Lot 7</text>
  </g>
  <g id="g-parking_08">
    <rect class="desk" id="parking_08" x="620" y="270" width="180" height="65" rx="4" />
    <text class="label" x="710" y="305">Parking Space Lot 8</text>
  </g>
  <g id="g-parking_09">
    <rect class="desk" id="parking_09" x="620" y="345" width="180" height="65" rx="4" />
    <text class="label" x="710" y="380">Parking Space Lot 9</text>
  </g>
  <g id="g-parking_10">
    <rect class="desk" id="parking_10" x="620" y="420" width="180" height="65" rx="4" />
    <text class="label" x="710" y="455">Parking Space Lot 10</text>
  </g>

</svg>