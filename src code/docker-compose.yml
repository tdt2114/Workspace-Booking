networks:
  workspace-net:
    driver: bridge

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      # Browser traffic should normally reach the API through web-final's /api proxy.
      # Keep this configurable for Swagger/direct API checks.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3002}
    ports:
      - "3001:3001"
    networks:
      - workspace-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  web-final:
    build:
      context: .
      dockerfile: Dockerfile.web-final
      args:
        # NEXT_PUBLIC_* must be passed at build time because Next.js bakes them into the browser bundle.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_API_BASE_URL: /api
        API_PROXY_TARGET: http://api:3001
    environment:
      NODE_ENV: production
      # Runtime env vars for the Next.js rewrite proxy.
      NEXT_PUBLIC_API_BASE_URL: /api
      API_PROXY_TARGET: http://api:3001
    ports:
      - "3002:3002"
    networks:
      - workspace-net
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  mobile-tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://web-final:3002
    networks:
      - workspace-net
    depends_on:
      web-final:
        condition: service_started
    restart: unless-stopped
